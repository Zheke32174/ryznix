name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Verify release identity and tests
        shell: bash
        run: |
          set -euo pipefail
          test "$GITHUB_REF_NAME" = "v$(cat VERSION)"
          python -m py_compile bin/ryznix-runtime.py bin/nixp.py
          python -m unittest discover -s tests -p 'test_*.py' -v
          python -m json.tool runtime.contract.json >/dev/null
          python -m json.tool config/runtime.example.json >/dev/null
      - name: Build reviewed source package
        shell: bash
        run: |
          set -euo pipefail
          VERSION=$(cat VERSION)
          STAGE="build/ryznix-$VERSION"
          mkdir -p "$STAGE/bin" "$STAGE/config" "$STAGE/docs/proof"
          cp VERSION README.md SHOWCASE.md runtime.contract.json "$STAGE/"
          cp bin/ryznix-runtime.py bin/nixp.py bin/ryznix bin/rk bin/nixp "$STAGE/bin/"
          cp config/runtime.example.json "$STAGE/config/"
          cp docs/publication-checklist.md "$STAGE/docs/"
          cp docs/proof/README.md "$STAGE/docs/proof/"
          find "$STAGE" -exec touch -h -d "@$(git log -1 --format=%ct)" {} +
          tar --sort=name --owner=0 --group=0 --numeric-owner \
            --mtime="@$(git log -1 --format=%ct)" \
            -C build -czf "ryznix-$VERSION-source-contract.tar.gz" "ryznix-$VERSION"
          sha256sum "ryznix-$VERSION-source-contract.tar.gz" > "ryznix-$VERSION-source-contract.tar.gz.sha256"
      - name: Publish immutable release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          gh release create "$GITHUB_REF_NAME" \
            "ryznix-$(cat VERSION)-source-contract.tar.gz" \
            "ryznix-$(cat VERSION)-source-contract.tar.gz.sha256" \
            --target "$GITHUB_SHA" \
            --verify-tag \
            --generate-notes \
            --title "Ryznix $GITHUB_REF_NAME"
