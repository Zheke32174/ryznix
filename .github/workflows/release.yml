name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Verify release identity
        shell: bash
        run: |
          set -euo pipefail
          test "$GITHUB_REF_NAME" = "v$(cat VERSION)"
          test -s MODOS_COMPONENT.yaml
          test -s docs/publication-checklist.md
          test -s docs/proof/README.md
      - name: Build reviewed source package
        shell: bash
        run: |
          set -euo pipefail
          VERSION=$(cat VERSION)
          EPOCH=$(git log -1 --format=%ct)
          STAGE="build/ryznix-$VERSION"
          mkdir -p "$STAGE/docs/proof"
          cp VERSION README.md SHOWCASE.md MODOS_COMPONENT.yaml "$STAGE/"
          cp docs/publication-checklist.md "$STAGE/docs/"
          cp docs/proof/README.md "$STAGE/docs/proof/"
          find "$STAGE" -exec touch -h -d "@$EPOCH" {} +
          tar --sort=name --owner=0 --group=0 --numeric-owner \
            --mtime="@$EPOCH" \
            -C build -czf "ryznix-$VERSION-source-contract.tar.gz" "ryznix-$VERSION"
          sha256sum "ryznix-$VERSION-source-contract.tar.gz" > "ryznix-$VERSION-source-contract.tar.gz.sha256"
          sha256sum -c "ryznix-$VERSION-source-contract.tar.gz.sha256"
      - name: Publish immutable release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          gh release create "$GITHUB_REF_NAME" \
            "ryznix-$(cat VERSION)-source-contract.tar.gz" \
            "ryznix-$(cat VERSION)-source-contract.tar.gz.sha256" \
            --target "$GITHUB_SHA" \
            --verify-tag \
            --generate-notes \
            --title "Ryznix $GITHUB_REF_NAME"
